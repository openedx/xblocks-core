[tox]
requires = tox-uv>=1
envlist = py312-django{42,52}, quality, docs
skipsdist = false

[testenv]
runner = uv-venv-lock-runner
setenv =
    PYTHONPATH = {toxinidir}
    DJANGO_SETTINGS_MODULE = test_settings
dependency_groups =
    django42: django42
    django52: test
allowlist_externals =
    mkdir
commands =
    mkdir -p var
    pytest {posargs} xblocks_contrib xblock_pdf

[testenv:docs]
runner = uv-venv-lock-runner
setenv =
    PYTHONPATH = {toxinidir}
    # Adding the option here instead of as a default in the docs Makefile because that Makefile is generated by sphinx.
    SPHINXOPTS = -W
allowlist_externals =
    make
    rm
dependency_groups = doc
commands =
    doc8 --ignore-path docs/_build README.rst docs
    rm -f docs/xblocks_contrib.rst
    rm -f docs/modules.rst
    make -e -C docs clean
    make -e -C docs html

[testenv:translations]
runner = uv-venv-lock-runner
allowlist_externals =
    make
dependency_groups = dev
commands =
    make validate_translations

[testenv:quality]
runner = uv-venv-lock-runner
allowlist_externals =
    make
dependency_groups = quality
commands =
    ruff check .
    ruff format --check .
    make selfcheck
