[tox]
envlist = py312-django{42,52}, quality, docs
skipsdist = true

[doc8]
; D001 = Line too long
ignore = D001

[pycodestyle]
exclude = .git,.tox,migrations
max-line-length = 120

[pydocstyle]
match-dir = (?!migrations)

[pytest]
pythonpath = .  # kind of a hack, but necessary to find test_settings.
DJANGO_SETTINGS_MODULE = test_settings
django_find_project = false
addopts = --cov src --cov-report term-missing --cov-report xml
norecursedirs = .* docs requirements site-packages

[testenv]
pythonpath = .
usedevelop = True  # Installs -e .
setenv =
    DJANGO_SETTINGS_MODULE = test_settings
deps =
    django42: Django>=4.2,<5.0
    django52: Django>=5.2,<6.0
    -r{toxinidir}/requirements/test.txt
    -r{toxinidir}/requirements/pip-tools.txt
allowlist_externals =
    mkdir
commands =
    pip install -e .
    mkdir -p var
    pytest {posargs} src

[testenv:docs]
pythonpath = .
usedevelop = True  # Installs -e .
setenv =
    # Adding the option here instead of as a default in the docs Makefile because that Makefile is generated by sphinx.
    SPHINXOPTS = -W
allowlist_externals =
    make
    rm
deps =
    -r{toxinidir}/requirements/doc.txt
    -r{toxinidir}/requirements/pip-tools.txt
commands =
    pip install -e .
    doc8 --ignore-path docs/_build README.rst docs
    rm -f docs/modules.rst
    make -e -C docs clean
    make -e -C docs html

[testenv:translations]
allowlist_externals =
    make
deps =
    -r{toxinidir}/requirements/dev.txt
commands =
    make validate_translations

[testenv:quality]
usedevelop = True  # Installs -e .
allowlist_externals =
    make
deps =
    -r{toxinidir}/requirements/quality.txt
commands =
    pylint src
    pycodestyle src
    pydocstyle src
    isort --check-only --diff src
    make selfcheck
